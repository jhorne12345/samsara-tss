<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tss · samsara</title>
  <link rel="icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="identity-banner" class="identity-banner" hidden>
  <span>Tell us your name to filter jobs you submit:</span>
  <input id="identity-input" type="text" maxlength="40" placeholder="e.g. jackson" autocomplete="off" />
  <button id="identity-save" type="button">save</button>
</div>
<div id="identity-pill" class="identity-pill" hidden>
  <span>as: <span id="identity-name"></span></span>
  <button id="identity-change" type="button" title="Change">change</button>
</div>

<header class="topbar">
  <div class="topbar-left">
    <span class="hostname">TSS-01</span>
    <span class="hostname-sep">/</span>
    <span class="hostname-role">DISPATCHER</span>
  </div>
  <div class="topbar-center">
    <div class="role-toggle" role="tablist" aria-label="View">
      <button id="role-engineer" class="role-tab is-active" role="tab" aria-selected="true">engineer</button>
      <button id="role-operator" class="role-tab"           role="tab" aria-selected="false">operator</button>
    </div>
  </div>
  <div class="topbar-right">
    <span class="live-indicator"><span class="live-dot"></span>LIVE</span>
    <span id="poll-status" class="poll-status">connecting…</span>
  </div>
</header>

<main id="dash-main">
  <section id="view-engineer" class="view view-engineer"></section>
  <section id="view-operator" class="view view-operator" hidden></section>
</main>

<footer class="footer">
  <span>samsara · test scheduling service · proof-of-concept</span>
</footer>

<aside id="job-panel" class="slide-over" hidden aria-hidden="true">
  <div class="slide-over-scrim" data-slide-close></div>
  <div class="slide-over-card" role="dialog" aria-label="Job detail">
    <header class="slide-over-head">
      <div class="slide-over-eyebrow">job</div>
      <h2 id="job-panel-title" class="slide-over-title mono">—</h2>
      <button class="slide-over-close" data-slide-close aria-label="Close">×</button>
    </header>
    <div id="job-panel-body" class="slide-over-body"></div>
  </div>
</aside>

<aside id="agent-panel" class="slide-over" hidden aria-hidden="true">
  <div class="slide-over-scrim" data-slide-close></div>
  <div class="slide-over-card" role="dialog" aria-label="Testbed detail">
    <header class="slide-over-head">
      <div class="slide-over-eyebrow">testbed</div>
      <h2 id="agent-panel-title" class="slide-over-title mono">—</h2>
      <button class="slide-over-close" data-slide-close aria-label="Close">×</button>
    </header>
    <div id="agent-panel-body" class="slide-over-body"></div>
  </div>
</aside>

<script src="/static/app.js"></script>

</body>
</html>
